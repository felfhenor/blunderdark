# Research nodes define the tech tree for dungeon advancement.
# Six branches: dark, nether, arcane, engineering, dominion, architecture
# Each node has: id, name, description, branch, cost, prerequisiteResearchIds, unlocks, tier, requiredTicks
# Unlock effect types: room, inhabitant, ability, upgrade, passive_bonus

# --- DARK BRANCH: root node ---
- id: 965efdaa-6c12-48e3-8337-3ad70b5d309d
  name: Dark Arts Fundamentals
  description: The foundational study of dark magic, opening paths to necromancy and soul manipulation.
  branch: dark
  cost:
    research: 10
  prerequisiteResearchIds: []
  unlocks:
    - type: room
      targetRoomId: Soul Well
    - type: roomfeature
      targetFeatureId: Blood Altar
  tier: 1
  requiredTicks: 50

# --- NETHER BRANCH: root node ---
- id: 2aab5d56-27a5-41d8-8140-1adc19c83dbe
