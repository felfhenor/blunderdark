  description: Open the dungeon to nether energies, allowing corruption and shadow forces to seep through the walls.
  branch: nether
  cost:
    research: 10
  prerequisiteResearchIds: []
  unlocks:
    - type: passive_bonus
      bonusType: corruptionGeneration
      value: 0.05
      description: +5% corruption generation
  tier: 1
  requiredTicks: 50

