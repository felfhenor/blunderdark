# Nether Branch research nodes (tier 2+)
# Root node (Nether Attunement) is in base.yml
#
# Tree structure (max 4 per tier):
#   Nether Attunement (T1)
#   ├── Shadow Magic (T2) [+Blighted Grove]
#   │   └── Corruption Control (T3) [+Corrupted Mine, +Blighted Ore]
#   │       ├── Shadow Weaving (T4) [+Shadow Magic + Corruption Control]
#   │       └── Purification Rites (T4) [+Purification Chamber]
#   │           ├── Purification Mastery (T5) [+Sanctified Basin, +Warding Pillars]
#   │           ├── Abyssal Purification (T5) [+Abyssal Filter]
#   │           └── Serpent's Gaze (T5) [+Shadow Weaving + Purification Rites]
#   ├── Corrupted Biome (T2)
#   └── Nether Channeling (T2)
#       └── Void Affinity (T3)
#           └── Nether Conduit (T4) [+Void Affinity + Corruption Control]
#   Abyssal Gateway (T5) [Shadow Weaving + Nether Conduit]
#   Abyssal Summoning (T6) [Abyssal Gateway]
#   Nether Apotheosis (T6) [Abyssal Gateway + Serpent's Gaze]

# --- TIER 2: Three paths branch from Nether Attunement ---

- id: 1b956dec-e63e-467d-bd4d-20541f157d40
  name: Shadow Magic
  description: Harness the power of shadows to conceal, deceive, and corrupt mushroom groves with shadow magic for tainted but abundant harvests.
  branch: nether
  cost:
    research: 25
    essence: 10
  prerequisiteResearchIds:
    - Nether Attunement
  unlocks:
    - type: passive_bonus
      bonusType: corruptionGeneration
      value: 0.10
      description: +10% corruption generation
    - type: roomupgrade
      targetRoomupgradeId: Blighted Grove
  tier: 2
  requiredTicks: 300

- id: 8d3e5a72-1f4c-49b8-b6d2-c7a0e9f31d58
  name: Corrupted Biome
  description: Harness shadow energy to twist stone and earth, enabling the creation of floors pulsing with malevolent corruption.
  branch: nether
  cost:
    research: 25
    essence: 10
  prerequisiteResearchIds:
    - Nether Attunement
  unlocks:
    - type: biome
      targetBiome: corrupted
    - type: roomfeature
      targetFeatureId: Bioluminescent Moss
  tier: 2
  requiredTicks: 300

- id: f4a4dc7a-660f-4684-9a52-d394cec8935b
  name: Nether Channeling
  description: Channel raw nether energy through dungeon corridors, intensifying the flow of corruption.
  branch: nether
  cost:
    research: 25
    corruption: 10
  prerequisiteResearchIds:
    - Nether Attunement
  unlocks:
    - type: passive_bonus
      bonusType: corruptionGeneration
      value: 0.10
      description: +10% corruption generation
  tier: 2
  requiredTicks: 300

# --- TIER 3: Specializations ---

- id: b4b92c13-7086-471f-8855-5c01301e73ea
  name: Corruption Control
  description: Master the volatile forces of corruption, bending them to your will and infusing crystal mines with dark energy for vastly increased yield.
  branch: nether
  cost:
    research: 50
    essence: 25
    corruption: 15
  prerequisiteResearchIds:
    - Shadow Magic
  unlocks:
    - type: passive_bonus
      bonusType: corruptionResistance
      value: 0.10
      description: Corruption thresholds increased by 10%
    - type: roomupgrade
      targetRoomupgradeId: Corrupted Mine
    - type: roomupgrade
      targetRoomupgradeId: Blighted Ore
  tier: 3
  requiredTicks: 750

- id: 93d2120e-d116-4581-89a7-e093fc47c4f4
  name: Void Affinity
  description: Attune to the void between realms, gaining resilience against the corrosive forces of nether energy.
  branch: nether
  cost:
    research: 50
    corruption: 25
  prerequisiteResearchIds:
    - Nether Channeling
  unlocks:
    - type: passive_bonus
      bonusType: corruptionResistance
      value: 0.15
      description: Corruption thresholds increased by 15%
  tier: 3
  requiredTicks: 750

# --- TIER 4: Advanced combinations ---

- id: 7758e38b-773b-426a-863e-c154566a49fa
  name: Shadow Weaving
  description: Weave shadows into semi-physical constructs that serve as both shield and weapon.
  branch: nether
  cost:
    research: 100
    essence: 50
    corruption: 25
  prerequisiteResearchIds:
    - Shadow Magic
    - Corruption Control
  unlocks:
    - type: passive_bonus
      bonusType: fearReduction
      value: 1
      description: All rooms gain +1 fear reduction
  tier: 4
  requiredTicks: 1500

- id: 72b0062a-ac4e-452a-a8e0-a1d6f54d50cb
  name: Purification Rites
  description: Discover the ancient rites of purification, enabling the construction of chambers that drain corruption from the dungeon.
  branch: nether
  cost:
    research: 100
    essence: 50
    corruption: 20
  prerequisiteResearchIds:
    - Corruption Control
  unlocks:
    - type: room
      targetRoomId: Purification Chamber
  tier: 4
  requiredTicks: 1500

- id: e2c237e2-27f5-4fc6-bbd6-8cf38317e016
  name: Nether Conduit
  description: Establish a permanent conduit to the nether realm, channeling its power directly into the dungeon.
  branch: nether
  cost:
    research: 100
    corruption: 50
    essence: 25
  prerequisiteResearchIds:
    - Void Affinity
    - Corruption Control
  unlocks:
    - type: passive_bonus
      bonusType: corruptionGeneration
      value: 0.15
      description: +15% corruption generation
  tier: 4
  requiredTicks: 1500

# --- TIER 5: Pinnacle powers ---

- id: de9b2001-7a9d-415c-bf42-936c813e02c5
  name: Abyssal Gateway
  description: Tear open a rift to the abyss, summoning forth entities of immense dark power.
  branch: nether
  cost:
    research: 200
    essence: 100
    corruption: 50
  prerequisiteResearchIds:
    - Shadow Weaving
    - Nether Conduit
  unlocks:
    - type: passive_bonus
      bonusType: essenceProduction
      value: 0.25
      description: +25% essence production from all sources
    - type: roomfeature
      targetFeatureId: Shadow Nexus
    - type: roomupgrade
      targetRoomupgradeId: Abyssal Gate
  tier: 5
  requiredTicks: 2250

- id: d5d60545-90a0-4f52-9000-ec2e6a7c63e2
  name: Purification Mastery
  description: Perfect the art of purification, unlocking advanced upgrades that enhance the chamber's drain rate and suppression aura.
  branch: nether
  cost:
    research: 200
    essence: 75
    corruption: 35
  prerequisiteResearchIds:
    - Purification Rites
  unlocks:
    - type: roomupgrade
      targetRoomupgradeId: Sanctified Basin
    - type: roomupgrade
      targetRoomupgradeId: Warding Pillars
  tier: 5
  requiredTicks: 1800

- id: c7f82a5e-cc60-4c23-bffb-935176664593
  name: Abyssal Purification
  description: Harness the power of the abyss to fuel purification, unlocking a dark upgrade that doubles drain rate and converts drained corruption into essence.
  branch: nether
  cost:
    research: 200
    essence: 100
    corruption: 50
  prerequisiteResearchIds:
    - Purification Rites
  unlocks:
    - type: roomupgrade
      targetRoomupgradeId: Abyssal Filter
  tier: 5
  requiredTicks: 2250

- id: d311dfe1-5fc4-4b3f-a394-670e219cb154
  name: Serpent's Gaze
  description: Unravel the petrification mysteries of the shadow realm, allowing the recruitment of a medusa whose gaze turns flesh to stone.
  branch: nether
  cost:
    research: 200
    essence: 100
    corruption: 50
  prerequisiteResearchIds:
    - Shadow Weaving
    - Purification Rites
  unlocks:
    - type: inhabitant
      targetInhabitantId: Medusa
  tier: 5
  requiredTicks: 2250

# --- TIER 6: Ultimate mastery ---

- id: 1771e65b-0113-4318-8eac-c10f6496d849
  name: Abyssal Summoning
  description: Command the deepest forces of the abyss to bind a demon lord to your service, the most feared of all infernal entities.
  branch: nether
  cost:
    research: 200
    essence: 100
    corruption: 50
  prerequisiteResearchIds:
    - Abyssal Gateway
  unlocks:
    - type: inhabitant
      targetInhabitantId: Demon Lord
  tier: 6
  requiredTicks: 2250

- id: fb26748a-73da-4d2b-b1f2-88e793ba817a
  name: Nether Apotheosis
  description: Achieve total mastery over nether forces, amplifying all corruption and shadow bonuses to their ultimate potential.
  branch: nether
  cost:
    research: 400
    corruption: 200
    essence: 100
  prerequisiteResearchIds:
    - Abyssal Gateway
    - Serpent's Gaze
  unlocks:
    - type: passive_bonus
      bonusType: netherMastery
      value: 0.50
      description: +50% to all nether branch bonuses
  tier: 6
  requiredTicks: 3000
