# Dark Branch research nodes (tier 2+)
# Root node (Dark Arts Fundamentals) is in base.yml
#
# Tree structure (max 4 per tier):
#   Dark Arts Fundamentals (T1)
#   ├── Soul Manipulation (T2)
#   │   └── Soul Well Mastery (T3)
#   └── Necromancy (T2)
#       ├── Undead Mastery (T3)
#       ├── Farplane Studies (T3)
#       │   └── Soul Binding (T4) [+2 soul capacity]
#       │       └── Ethereal Resonance (T5) [+2 soul capacity]
#       └── Rune Extraction (T3) → feature_flag: rune_extraction
#           └── Runeworking Techniques (T4) → Runeworking Chamber
#   Dark Rituals (T4) [Undead Mastery + Soul Well Mastery, +Necronomicon Wing]
#   Soul Forge (T4) [Soul Well Mastery + Undead Mastery, +Abyssal Conduit]
#   Necromantic Ascension (T5) [Soul Forge]
#   Dark Apotheosis (T6) [Necromantic Ascension + Ethereal Resonance]

# --- TIER 2: Two paths branch from Dark Arts Fundamentals ---

- id: 36c41bbd-675c-4300-abf7-273cd46333ef
  name: Soul Manipulation
  description: Learn to harvest and channel soul energy, the fundamental currency of dark power.
  branch: dark
  cost:
    research: 25
    essence: 5
  prerequisiteResearchIds:
    - Dark Arts Fundamentals
  unlocks:
    - type: passive_bonus
      bonusType: essenceProduction
      value: 0.10
      description: +10% essence production from all sources
  tier: 2
  requiredTicks: 300

- id: 303c1628-2834-4abf-a1e2-617fb554d151
  name: Necromancy
  description: The art of animating the dead, turning fallen enemies into loyal servants.
  branch: dark
  cost:
    research: 25
    essence: 5
  prerequisiteResearchIds:
    - Dark Arts Fundamentals
  unlocks:
    - type: inhabitant
      targetInhabitantId: Skeleton
    - type: roomfeature
      targetFeatureId: Coffins
  tier: 2
  requiredTicks: 300

# --- TIER 3: Specializations ---

- id: 212cfb42-9e00-4114-b755-32c6c60ca482
  name: Undead Mastery
  description: Exert absolute control over undead minions, increasing their strength and durability.
  branch: dark
  cost:
    research: 50
    essence: 15
  prerequisiteResearchIds:
    - Necromancy
  unlocks:
    - type: passive_bonus
      bonusType: undeadEfficiency
      value: 0.20
      description: +20% undead worker efficiency
    - type: roomfeature
      targetFeatureId: Soul Furnace
  tier: 3
  requiredTicks: 750

- id: 8a4edb8b-65bb-4d08-a30c-45097e1e8483
  name: Soul Well Mastery
  description: Construct a reservoir for captured souls, providing a steady stream of dark energy.
  branch: dark
  cost:
    research: 50
    essence: 15
  prerequisiteResearchIds:
    - Soul Manipulation
  unlocks:
    - type: passive_bonus
      bonusType: essenceProduction
      value: 0.15
      description: +15% essence production from all sources
  tier: 3
  requiredTicks: 750

- id: 78ba7f10-7290-4e85-ab57-41543b257ab2
  name: Farplane Studies
  description: Uncover the secrets of the boundary between life and death, enabling the construction of a Farplane to capture the souls of fallen defenders.
  branch: dark
  cost:
    research: 50
    essence: 15
  prerequisiteResearchIds:
    - Necromancy
  unlocks:
    - type: room
      targetRoomId: Farplane
  tier: 3
  requiredTicks: 750

- id: 48465784-afc0-4fa8-936e-dfe932df4bfb
  name: Rune Extraction
  description: Discover techniques to extract trait runes from prisoners during the extraction stage of the torture pipeline, yielding permanent rune items tied to the invader's class.
  branch: dark
  cost:
    research: 60
    gold: 20
    essence: 10
  prerequisiteResearchIds:
    - Necromancy
  unlocks:
    - type: feature_flag
      featureFlag: rune_extraction
      description: Rune Extraction
  tier: 3
  requiredTicks: 875

# --- TIER 4: Advanced combinations ---

- id: 153fd103-9151-4b42-8d1a-8c39f69fd377
  name: Dark Rituals
  description: Perform elaborate ceremonies combining necromancy and soul magic, unlocking forbidden library wings dedicated to the darkest tomes.
  branch: dark
  cost:
    research: 100
    essence: 30
    corruption: 15
  prerequisiteResearchIds:
    - Undead Mastery
    - Soul Well Mastery
  unlocks:
    - type: passive_bonus
      bonusType: essenceProduction
      value: 0.20
      description: +20% essence production from all sources
    - type: roomupgrade
      targetRoomupgradeId: Necronomicon Wing
  tier: 4
  requiredTicks: 1500

- id: 9fdc4500-6479-4348-973a-159cb86bade3
  name: Soul Binding
  description: Master the art of binding departed souls to the Farplane, expanding its capacity to hold additional spirits.
  branch: dark
  cost:
    research: 100
    essence: 30
  prerequisiteResearchIds:
    - Farplane Studies
  unlocks:
    - type: passive_bonus
      bonusType: farplaneSoulCapacity
      value: 2
      description: +2 Farplane soul capacity
    - type: roomupgrade
      targetRoomupgradeId: Spiritual Expansion
  tier: 4
  requiredTicks: 1500

- id: 06e35397-21ce-4edd-9bdb-82f57e36fb7e
  name: Runeworking Techniques
  description: Learn to construct a Runeworking Chamber where trait runes can be permanently embedded into inhabitants, granting them powerful bonuses.
  branch: dark
  cost:
    research: 80
    gold: 30
    crystals: 15
  prerequisiteResearchIds:
    - Rune Extraction
  unlocks:
    - type: room
      targetRoomId: Runeworking Chamber
  tier: 4
  requiredTicks: 1350

- id: 031cb877-8674-4213-ae08-424ca51fd8c8
  name: Soul Forge
  description: Forge captured souls into powerful artifacts, imbue minions with stolen life force, and channel abyssal energies through the soul well.
  branch: dark
  cost:
    research: 100
    essence: 30
    corruption: 15
  prerequisiteResearchIds:
    - Soul Well Mastery
    - Undead Mastery
  unlocks:
    - type: passive_bonus
      bonusType: inhabitantStats
      value: 0.10
      description: +10% to all inhabitant combat stats
    - type: roomupgrade
      targetRoomupgradeId: Abyssal Conduit
  tier: 4
  requiredTicks: 1500

# --- TIER 5: Pinnacle powers ---

- id: 2a744cf1-30fe-45d1-a135-dfe3ca596bea
  name: Necromantic Ascension
  description: Achieve the pinnacle of necromantic power, enabling the binding of an ancient lich — an undead sorcerer of terrifying intellect.
  branch: dark
  cost:
    research: 200
    essence: 60
    corruption: 30
  prerequisiteResearchIds:
    - Soul Forge
  unlocks:
    - type: inhabitant
      targetInhabitantId: Lich
  tier: 5
  requiredTicks: 2250

- id: 2398d825-9ddc-4a1a-b6c2-950ed0da4486
  name: Ethereal Resonance
  description: Attune the Farplane to deeper ethereal frequencies, further increasing its ability to shelter wayward souls.
  branch: dark
  cost:
    research: 150
    essence: 45
  prerequisiteResearchIds:
    - Soul Binding
  unlocks:
    - type: passive_bonus
      bonusType: farplaneSoulCapacity
      value: 2
      description: +2 Farplane soul capacity
    - type: roomupgrade
      targetRoomupgradeId: Ethereal Amplification
  tier: 5
  requiredTicks: 1800

# --- TIER 6: Ultimate mastery ---

- id: ecd83419-15ec-4fde-9379-bde84da01a77
  name: Dark Apotheosis
  description: Transcend mortal limitations through total mastery of dark forces, becoming an avatar of darkness itself.
  branch: dark
  cost:
    research: 400
    essence: 120
    corruption: 60
  prerequisiteResearchIds:
    - Necromantic Ascension
    - Ethereal Resonance
  unlocks:
    - type: passive_bonus
      bonusType: darkMastery
      value: 0.50
      description: +50% to all dark branch bonuses
  tier: 6
  requiredTicks: 3000
