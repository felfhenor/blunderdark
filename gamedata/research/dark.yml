# Dark Branch research nodes (tier 2+)
# Root node (Dark Arts Fundamentals) is in base.yml
#
# Tree structure (max 4 per tier):
#   Dark Arts Fundamentals (T1)
#   ├── Soul Manipulation (T2)
#   │   └── Soul Well Mastery (T3)
#   ├── Shadow Magic (T2) [+Blighted Grove]
#   │   └── Corruption Control (T3) [+Corrupted Mine, +Blighted Ore]
#   │       ├── Shadow Weaving (T4) [+Shadow Magic]
#   │       └── Purification Rites (T4) [+Purification Chamber]
#   │           ├── Purification Mastery (T5) [+Sanctified Basin, +Warding Pillars]
#   │           └── Abyssal Purification (T5) [+Abyssal Filter]
#   ├── Necromancy (T2)
#   │   ├── Undead Mastery (T3)
#   │   │   └── Dark Rituals (T4) [+Soul Well Mastery, +Necronomicon Wing]
#   │   └── Farplane Studies (T3) [+Farplane]
#   │       └── Soul Binding (T4) [+2 soul capacity]
#   │           └── Ethereal Resonance (T6) [+2 soul capacity]
#   └── Corrupted Biome (T2)
#   Soul Forge (T4) [Soul Well Mastery + Undead Mastery, +Abyssal Conduit]
#   Abyssal Gateway (T5) [Dark Rituals + Shadow Weaving]
#   Necromantic Ascension (T5) [Soul Forge]
#   Abyssal Summoning (T6) [Abyssal Gateway + Soul Forge]
#   Serpent's Gaze (T6) [Abyssal Gateway]
#   Dark Apotheosis (T6) [Abyssal Gateway + Soul Forge]

# --- TIER 2: Four paths branch from Dark Arts Fundamentals ---

- id: 36c41bbd-675c-4300-abf7-273cd46333ef
  name: Soul Manipulation
  description: Learn to harvest and channel soul energy, the fundamental currency of dark power.
  branch: dark
  cost:
    research: 25
    essence: 5
  prerequisiteResearchIds:
    - Dark Arts Fundamentals
  unlocks:
    - type: passive_bonus
      bonusType: essenceProduction
      value: 0.10
      description: +10% essence production from all sources
  tier: 2
  requiredTicks: 150

- id: 1b956dec-e63e-467d-bd4d-20541f157d40
  name: Shadow Magic
  description: Harness the power of shadows to conceal, deceive, and corrupt mushroom groves with shadow magic for tainted but abundant harvests.
  branch: dark
  cost:
    research: 25
    essence: 5
  prerequisiteResearchIds:
    - Dark Arts Fundamentals
  unlocks:
    - type: passive_bonus
      bonusType: corruptionGeneration
      value: 0.10
      description: +10% corruption generation
    - type: roomupgrade
      targetRoomupgradeId: Blighted Grove
  tier: 2
  requiredTicks: 150

- id: 303c1628-2834-4abf-a1e2-617fb554d151
  name: Necromancy
  description: The art of animating the dead, turning fallen enemies into loyal servants.
  branch: dark
  cost:
    research: 25
    essence: 5
  prerequisiteResearchIds:
    - Dark Arts Fundamentals
  unlocks:
    - type: inhabitant
      targetInhabitantId: Skeleton
    - type: roomfeature
      targetFeatureId: Coffins
  tier: 2
  requiredTicks: 150

- id: 8d3e5a72-1f4c-49b8-b6d2-c7a0e9f31d58
  name: Corrupted Biome
  description: Harness shadow energy to twist stone and earth, enabling the creation of floors pulsing with malevolent corruption.
  branch: dark
  cost:
    research: 25
    essence: 5
  prerequisiteResearchIds:
    - Dark Arts Fundamentals
  unlocks:
    - type: biome
      targetBiome: corrupted
    - type: roomfeature
      targetFeatureId: Bioluminescent Moss
  tier: 2
  requiredTicks: 150

# --- TIER 3: Specializations ---

- id: 212cfb42-9e00-4114-b755-32c6c60ca482
  name: Undead Mastery
  description: Exert absolute control over undead minions, increasing their strength and durability.
  branch: dark
  cost:
    research: 50
    essence: 15
  prerequisiteResearchIds:
    - Necromancy
  unlocks:
    - type: passive_bonus
      bonusType: undeadEfficiency
      value: 0.20
      description: +20% undead worker efficiency
    - type: roomfeature
      targetFeatureId: Phylactery
  tier: 3
  requiredTicks: 300

- id: 8a4edb8b-65bb-4d08-a30c-45097e1e8483
  name: Soul Well Mastery
  description: Construct a reservoir for captured souls, providing a steady stream of dark energy.
  branch: dark
  cost:
    research: 50
    essence: 15
  prerequisiteResearchIds:
    - Soul Manipulation
  unlocks:
    - type: passive_bonus
      bonusType: essenceProduction
      value: 0.15
      description: +15% essence production from all sources
  tier: 3
  requiredTicks: 300

- id: b4b92c13-7086-471f-8855-5c01301e73ea
  name: Corruption Control
  description: Master the volatile forces of corruption, bending them to your will and infusing crystal mines with dark energy for vastly increased yield.
  branch: dark
  cost:
    research: 50
    essence: 15
    corruption: 5
  prerequisiteResearchIds:
    - Shadow Magic
  unlocks:
    - type: passive_bonus
      bonusType: corruptionResistance
      value: 0.10
      description: Corruption thresholds increased by 10%
    - type: roomupgrade
      targetRoomupgradeId: Corrupted Mine
    - type: roomupgrade
      targetRoomupgradeId: Blighted Ore
  tier: 3
  requiredTicks: 300

- id: 78ba7f10-7290-4e85-ab57-41543b257ab2
  name: Farplane Studies
  description: Uncover the secrets of the boundary between life and death, enabling the construction of a Farplane to capture the souls of fallen defenders.
  branch: dark
  cost:
    research: 50
    essence: 15
  prerequisiteResearchIds:
    - Necromancy
  unlocks:
    - type: room
      targetRoomId: Farplane
  tier: 3
  requiredTicks: 300

