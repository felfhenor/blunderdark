# Architecture Branch research nodes
# A new branch focused on room upgrades and structural improvement.
# Room upgrades are bundled by thematic room pair to keep the tree compact.
#
# Tree structure (max 4 per tier):
#   Structural Mastery (T1, root)
#   ├── Resource Room Design (T2) → Expanded Tunnels + Expanded Grove
#   │   ├── Deep Extraction (T3) → Deep Vein Mine + Bountiful Grove
#   │   └── Aquatic & Soul Engineering (T3) → Expanded Lake + Necrotic Well + Purified Well
#   ├── Sanctum Design (T2) → Empowered Altar + Reinforced Vault
#   ├── Quarters & Arena Design (T2) → Comfortable Quarters + Grand Arena
#   │   └── Combat Specialization (T3) → Elite Arena + Inquisitor's Chamber + War Room
#   └── Scholarly Design (T2) → Expanded Archives + Expanded Nexus
#       └── Workshop Mastery (T3) → Distillery + Master Trapworks + Dual Circle
#   Resonant Design (T4) [Deep Extraction + Sanctum Design] → Resonant Mine + Tranquil Garden
#   Deep Water & Financial Design (T4) [Aquatic & Soul + Sanctum Design] → Deepwater Lake + Investment Vault
#   Advanced Combat Design (T4) [Combat Spec + Scholarly Design] → Drill Hall + Corruption Chamber
#   Arcane Facility Mastery (T4) [Workshop Mastery + Quarters & Arena] → Amplified Nexus + Binding Circle
#   Abyssal Waters (T5) [Deep Water + Resonant] → Dark Waters + Dragon's Hoard
#   Ascendant Altar (T5) [Deep Water + Resonant] → Ascendant Altar + Forbidden Archives
#   Dark Facility Mastery (T5) [Adv Combat + Arcane Facility] → Dread Chamber + Dark Pool + Expanded Laboratory
#   Architectural Mastery (T6) → capstone passive

# --- TIER 1: Root node ---

- id: 7f9bf027-2523-4f11-a7a5-7151032cbda4
  name: Structural Mastery
  description: Study the fundamental principles of room design and structural enhancement, unlocking the ability to specialize and upgrade dungeon chambers.
  branch: architecture
  cost:
    research: 10
    gold: 5
  prerequisiteResearchIds: []
  unlocks:
    - type: feature_flag
      featureFlag: room_upgrades
      description: Room Upgrades
  tier: 1
  requiredTicks: 50

