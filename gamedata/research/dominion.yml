    food: 30
    gold: 15
  prerequisiteResearchIds:
    - Spirit Binding
    - Transmutation
  unlocks:
    - type: passive_bonus
      bonusType: globalWorkerEfficiency
      value: 0.10
      description: +10% worker efficiency for all inhabitants
  tier: 4
  requiredTicks: 1500

- id: f027eb3f-b483-4fa0-abd3-dfd0273725fa
  name: Elite Training
