# Dominion Branch research nodes (tier 2+)
# Root node (Creature Lore) is in base.yml
#
# Theme: The art of commanding, recruiting, and empowering dungeon creatures.
# Primary currency: food (thematic — feeding/maintaining creatures). Secondary: gold.
#
# Tree structure (max 4 per tier):
#   Creature Lore (T1)
#   ├── Stone Shaping (T2) → Gargoyle
#   │   └── Nature Attunement (T3) → Dryad
#   ├── Dark Pacts (T2) → Imp
#   │   └── Spirit Binding (T3) → Wraith [+Greater Circle]
#   ├── Elemental Crystallization (T2) → Stone Elemental
#   │   └── Transmutation (T3) → Mimic
#   └── Martial Training (T2) → Orc
#       └── Creature Quarters (T3) → features [+Teeming Pool]
#   Horde Tactics (T4) [Nature Attunement + Creature Quarters, +Incubation Chamber]
#   Pack Mentality (T4) [Spirit Binding + Transmutation]
#   Elite Training (T4) [Creature Quarters + Transmutation, +Mutagenic Pits]
#   Garrison Command (T4) [Spirit Binding + Creature Quarters, +Garrison Expansion]
#   Supreme Command (T5) [Horde Tactics + Pack Mentality]
#   Creature Synergy (T5) [Elite Training + Horde Tactics]
#   Forced March (T5) [Pack Mentality + Elite Training]
#   Vast Dominion (T5) [Garrison Command + Horde Tactics]
#   Sovereign's Will (T6) [Supreme Command + Creature Synergy]

# --- TIER 2: Four paths branch from Creature Lore ---

- id: cfc13507-6610-4adf-822b-b1c1beacdd6e
  name: Stone Shaping
  description: Master the art of sculpting stone into living forms, enabling the recruitment of gargoyles as vigilant sentinels.
  branch: dominion
  cost:
    research: 25
    food: 5
  prerequisiteResearchIds:
    - Creature Lore
  unlocks:
    - type: inhabitant
      targetInhabitantId: Gargoyle
  tier: 2
  requiredTicks: 300

- id: e01d43f1-b4c6-4483-800f-7bfad3aa2daf
  name: Dark Pacts
  description: Forge binding contracts with demonic entities, allowing imps to be recruited as mischievous but effective dungeon workers.
  branch: dominion
  cost:
    research: 25
    food: 5
  prerequisiteResearchIds:
    - Creature Lore
  unlocks:
    - type: inhabitant
      targetInhabitantId: Imp
  tier: 2
  requiredTicks: 300

- id: 1e1a283e-3b94-4d52-b218-09090cedaec7
  name: Elemental Crystallization
  description: Learn to coalesce raw flux into semi-sentient crystalline forms, enabling the recruitment of stone elementals.
  branch: dominion
  cost:
    research: 25
    food: 5
  prerequisiteResearchIds:
    - Creature Lore
  unlocks:
    - type: inhabitant
      targetInhabitantId: Stone Elemental
  tier: 2
  requiredTicks: 300

- id: f6487b40-fc5d-4909-92f3-5c049ff13d96
  name: Martial Training
  description: Establish combat training programs that attract orcish warriors to serve as powerful frontline fighters.
  branch: dominion
  cost:
    research: 25
    food: 5
  prerequisiteResearchIds:
    - Creature Lore
  unlocks:
    - type: inhabitant
      targetInhabitantId: Orc
  tier: 2
  requiredTicks: 300

# --- TIER 3: Creature specializations ---

- id: 9984c67b-e4eb-4734-9e7c-757f9713eccb
  name: Nature Attunement
  description: Harmonize with the natural arcane energies of living things, allowing dryads to be recruited as regenerative caretakers of the dungeon.
  branch: dominion
  cost:
    research: 50
    food: 15
  prerequisiteResearchIds:
    - Stone Shaping
  unlocks:
    - type: inhabitant
      targetInhabitantId: Dryad
  tier: 3
  requiredTicks: 750

- id: e1b0fbf9-fe73-4c64-b0a1-3cf6a118d320
  name: Spirit Binding
  description: Learn to bind restless spirits into corporeal forms, enabling wraith recruitment and expanding the summoning circle's power for higher-tier entities.
  branch: dominion
  cost:
    research: 50
    food: 15
  prerequisiteResearchIds:
    - Dark Pacts
  unlocks:
    - type: inhabitant
      targetInhabitantId: Wraith
    - type: roomupgrade
      targetRoomupgradeId: Greater Circle
  tier: 3
  requiredTicks: 750

- id: de20f99f-edc6-4cab-a775-cb8a1626881e
  name: Transmutation
  description: Study the art of reshaping matter and identity, unlocking the ability to recruit mimics — shapeshifting creatures of deception.
  branch: dominion
  cost:
    research: 50
    food: 15
  prerequisiteResearchIds:
    - Elemental Crystallization
  unlocks:
    - type: inhabitant
      targetInhabitantId: Mimic
  tier: 3
  requiredTicks: 750

- id: 849a01b0-b6b5-47ea-8c77-daf471b6a6d3
  name: Creature Quarters
  description: Develop magical augmentation techniques for room modifications and enhance spawning pool biology for faster creature production.
  branch: dominion
  cost:
    research: 50
    food: 15
  prerequisiteResearchIds:
    - Martial Training
  unlocks:
    - type: roomfeature
      targetFeatureId: Storage Expansion
    - type: roomfeature
      targetFeatureId: Efficiency Enchantment
    - type: roomfeature
      targetFeatureId: Fear Ward
    - type: roomupgrade
      targetRoomupgradeId: Teeming Pool
  tier: 3
  requiredTicks: 750

# --- TIER 4: Advanced combinations ---

- id: 9c082222-e010-4872-9ab3-cac0b697ca41
  name: Horde Tactics
  description: Coordinate large groups of diverse creatures as a unified force, maximizing inhabitant capacity and designing advanced incubation chambers.
  branch: dominion
  cost:
    research: 100
    food: 30
    gold: 15
  prerequisiteResearchIds:
    - Nature Attunement
    - Creature Quarters
  unlocks:
    - type: passive_bonus
      bonusType: maxInhabitants
      value: 5
      description: +5 maximum inhabitants
    - type: roomupgrade
      targetRoomupgradeId: Incubation Chamber
  tier: 4
  requiredTicks: 1500

- id: 79328f84-7d0f-4c45-94c6-9cf361661fd9
