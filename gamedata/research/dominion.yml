    - type: roomupgrade
      targetRoomupgradeId: Flesh Vats
  tier: 4
  requiredTicks: 1500

- id: 7b1bb0f6-6399-4174-81c0-fad6f7ca2ab2
  name: Garrison Command
  description: Establish a centralized command structure for barracks operations, unlocking garrison expansions that increase the dungeon's overall inhabitant capacity.
  branch: dominion
  cost:
    research: 100
    food: 30
    gold: 15
  prerequisiteResearchIds:
    - Spirit Binding
    - Creature Quarters
  unlocks:
