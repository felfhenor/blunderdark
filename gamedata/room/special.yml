      bonus: 0.15
      description: Soul energy from the Well enhances purification (+0.15/min drain).
    - adjacentRoomId: Shadow Library
      bonus: 0.15
      description: Arcane knowledge from the Library refines the purification ritual (+0.15/min drain).
    - adjacentRoomId: Torture Chamber
      bonus: 0.15
      description: Suffering extracted in the Torture Chamber fuels corruption cleansing (+0.15/min drain).
    - adjacentRoomId: Altar Room
      bonus: 0.25
      description: The Altar's divine resonance greatly amplifies purification (+0.25/min drain and aura synergy).
  roomUpgradeIds:
    - Sanctified Basin
    - Warding Pillars
    - Abyssal Filter

