- id: ce40f61f-0037-49d7-94aa-9c5462816c96
  name: Purification Chamber
  description: A sanctified chamber that slowly drains corruption from the dungeon and suppresses corruption output in adjacent rooms. Workers stationed here amplify the cleansing effect. Place near Soul Wells or Shadow Libraries for bonus drain.
  shapeId: Trident
  cost:
    gold: 80
    crystals: 40
    essence: 15
  production:
    corruption: -3.0
  requiresWorkers: false
  maxInhabitants: 2
  maxFeatures: 1
  fearLevel: 1
  removable: true
  isUnique: false
  invasionProfile:
    dimension: corruption
    weight: 8
  adjacencyBonuses:
