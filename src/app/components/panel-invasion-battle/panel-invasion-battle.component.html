<app-modal
  [(visible)]="visible"
  [allowEscToClose]="false"
  [widthClass]="'max-w-4xl'"
>
  <div replacement>
    <div
      class="battle-container flex flex-col bg-base-100 rounded-lg overflow-hidden"
    >
      <!-- Header -->
      <div
        class="flex items-center justify-between px-4 py-3 bg-base-200 flex-shrink-0"
      >
        <h1 class="text-lg font-bold">
          <app-invasion-phase-title
            [phase]="phase()"
            [isVictory]="isVictory()"
          />
        </h1>
      </div>

      @switch (phase()) {
        @case ('results') {
          @if (result(); as res) {
            <app-invasion-results-phase
              [result]="res"
              [isVictory]="isVictory()"
              (advance)="advancePhase()"
            />
          }
        }

        @case ('rewards') {
          @if (result(); as res) {
            <app-invasion-rewards-phase
              [result]="res"
              [isVictory]="isVictory()"
              (advance)="advancePhase()"
            />
          }
        }
      }
    </div>
  </div>
</app-modal>
